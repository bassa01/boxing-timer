<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#86cecb">
    <title>Kickboxing Training</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles/style.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Kickboxing</p>
          <h1>練習メニュー</h1>
        </div>
        <button class="icon-button" id="installButton" hidden aria-label="ホーム画面に追加">＋</button>
      </header>

      <main id="app" class="app-main" aria-live="polite"></main>

      <nav class="tabbar" aria-label="画面切り替え">
        <button class="tab-button is-active" data-view="home">ホーム</button>
        <button class="tab-button" data-view="menus">メニュー</button>
        <button class="tab-button" data-view="history">履歴</button>
        <button class="tab-button" data-view="settings">設定</button>
      </nav>
    </div>

    <template id="homeView">
      <section class="view-stack">
        <div class="hero-panel">
          <div>
            <p class="eyebrow">Today</p>
            <h2 data-today-title>今日のメニュー</h2>
            <p class="muted" data-today-summary></p>
          </div>
          <button class="primary-button full-width" data-action="start-today">今日の練習を開始</button>
        </div>
        <div class="secondary-actions">
          <button class="secondary-button" data-action="edit-today">内容を編集</button>
          <button class="ghost-button" data-action="new-menu">新しいメニューを作る</button>
        </div>
        <section>
          <h2 class="section-title">最近の履歴</h2>
          <div class="list" data-recent-history></div>
        </section>
      </section>
    </template>

    <template id="menusView">
      <section class="view-stack">
        <div class="toolbar">
          <h2 class="section-title">メニュー一覧</h2>
          <button class="secondary-button small" data-action="new-menu">追加</button>
        </div>
        <div class="list" data-menu-list></div>
      </section>
    </template>

    <template id="editView">
      <section class="view-stack">
        <div class="toolbar">
          <button class="ghost-button" data-action="back">戻る</button>
          <button class="primary-button small" data-action="save-menu">保存</button>
        </div>
        <form class="form" data-menu-form>
          <label>
            <span>メニュー名</span>
            <input name="name" type="text" required>
          </label>
          <div class="field-grid">
            <label>
              <span>ラウンド数</span>
              <input name="roundCount" type="number" min="1" max="12" inputmode="numeric">
            </label>
            <label>
              <span>ラウンド秒</span>
              <input name="roundSeconds" type="number" min="5" max="1800" inputmode="numeric">
            </label>
            <label>
              <span>休憩秒</span>
              <input name="restSeconds" type="number" min="0" max="600" inputmode="numeric">
            </label>
          </div>
          <label>
            <span>メモ</span>
            <textarea name="memo" rows="3"></textarea>
          </label>
          <div class="editor-stack" data-round-editor></div>
          <div class="editor-stack" data-rest-editor></div>
        </form>
      </section>
    </template>

    <template id="runView">
      <section class="run-screen">
        <div class="run-state" data-run-state>待機中</div>
        <div class="run-number" data-run-number>Round 1</div>
        <div class="timer" data-run-time>03:00</div>
        <section class="run-content">
          <p class="eyebrow">今やる内容</p>
          <h2 data-run-current></h2>
        </section>
        <section class="run-next">
          <p class="eyebrow">次</p>
          <p data-run-next></p>
        </section>
        <div class="run-controls">
          <button class="primary-button run-toggle-button" data-action="toggle-run">開始</button>
          <div class="run-secondary-controls">
            <button class="secondary-button" data-action="skip-run">次へ進む</button>
            <button class="danger-button" data-action="end-run">練習を終了</button>
          </div>
        </div>
      </section>
    </template>

    <template id="historyView">
      <section class="view-stack">
        <h2 class="section-title">履歴</h2>
        <div class="list" data-history-list></div>
      </section>
    </template>

    <template id="settingsView">
      <section class="view-stack">
        <h2 class="section-title">設定</h2>
        <div class="settings-panel">
          <label class="check-row"><input type="checkbox" data-setting="soundEnabled">通知音</label>
          <label class="check-row"><input type="checkbox" data-setting="speechEnabled">読み上げ</label>
          <label><span>初期ラウンド秒</span><input type="number" data-setting="defaultRoundSeconds" min="5" max="1800"></label>
          <label><span>初期休憩秒</span><input type="number" data-setting="defaultRestSeconds" min="0" max="600"></label>
        </div>
        <div class="action-grid">
          <button class="secondary-button" data-action="export-json">JSON出力</button>
          <label class="secondary-button file-button">JSON読込<input type="file" accept="application/json" data-action="import-json"></label>
        </div>
        <section>
          <h2 class="section-title">ユーザー技テンプレート</h2>
          <div class="tag-list" data-custom-techniques></div>
        </section>
      </section>
    </template>

    <script type="module" src="src/app.js"></script>
  </body>
</html>
